preset:
  name: duckduckgo
  description: "DuckDuckGo HTML Search access"

network_policies:
  duckduckgo:
    name: duckduckgo
    endpoints:
      - host: html.duckduckgo.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: POST, path: "/html" }
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
